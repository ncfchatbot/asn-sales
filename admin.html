            currentAdminLang = lang;

            document.querySelectorAll('.lang-btn-la').forEach(el => el.classList.toggle('border-amber-400', lang === 'la'));
            document.querySelectorAll('[data-i18n]').forEach(el => { 
                const key = el.getAttribute('data-i18n'); 
                if(i18nAdmin[currentAdminLang][key]) el.innerHTML = i18nAdmin[currentAdminLang][key]; 
            });

            if(!document.getElementById('orders-view').classList.contains('hidden')) loadOrders();
            if(!document.getElementById('reports-view').classList.contains('hidden')) generateReport();
        }

        async function loadSetupData() { 
            try {
                const { data: cats } = await _client.from('product_categories').select('*').order('name'); 
                const { data: units } = await _client.from('product_units').select('*').order('name'); 
                globalCategories = cats || []; globalUnits = units || []; 
            } catch(e) { }
        }

        async function loadUsers() { 
            try {
                const { data } = await _client.from('salesmen').select('*').order('role').order('id'); 
                if(data) { 
                    allUsers = data; 
                    const tbody = document.getElementById('userTableBody');
                    if(tbody) {
                        tbody.innerHTML = data.map(u => { 
                            let rBadge = u.role==='manager' ? '👑 Manager' : (u.role==='admin' ? '🛠️ Admin' : '👤 Sales'); 
                            let rColor = u.role==='manager' ? 'bg-amber-100 text-amber-800 border-amber-200' : (u.role==='admin' ? 'bg-indigo-100 text-indigo-700 border-indigo-200' : 'bg-slate-100 text-slate-600 border-slate-200'); 
                            const delBtn = currentAdmin && currentAdmin.role === 'manager' && u.id !== currentAdmin.id ? `<button onclick="deleteUser(${u.id},'${u.name}')" class="text-red-500 hover:text-white bg-red-50 hover:bg-red-500 px-3 py-1.5 rounded-lg text-xs font-bold transition-all active:scale-95">ลบ</button>` : ''; 
                            return `<tr class="hover:bg-slate-50 transition-colors"><td class="p-4 font-bold text-slate-800">${u.name}</td><td class="p-4 text-center"><span class="font-mono text-slate-600 bg-white border border-slate-200 px-3 py-1 rounded-lg tracking-widest">${u.pin||'-'}</span></td><td class="p-4"><span class="px-2.5 py-1 rounded-lg text-xs font-bold border ${rColor}">${rBadge}</span></td><td class="p-4 text-center flex justify-center gap-2"><button onclick="openUserEdit(${u.id})" class="text-blue-600 hover:text-white bg-blue-50 hover:bg-blue-600 border border-blue-200 px-3 py-1.5 rounded-lg text-xs font-bold transition-all active:scale-95">แก้ไข</button>${delBtn}</td></tr>`; 
                        }).join(''); 
                    }
                } 
            } catch(e) { } 
        }

        async function adminLogin() {
            const btn = document.getElementById('btnAdminLogin');
            btn.innerText = '⏳ กำลังเชื่อมต่อข้อมูล... (รอสักครู่)';
            btn.disabled = true;

            try {
                const pin = document.getElementById('adminPinInput').value;
                const { data, error } = await _client.from('salesmen').select('*').eq('pin', pin).single();
                
                if (error || !data || (data.role !== 'admin' && data.role !== 'manager')) { 
                    document.getElementById('adminLoginErr').classList.remove('hidden'); 
                    return; 
                }
                
                currentAdmin = data; 
                document.getElementById('navRoleBadge').innerText = data.role === 'manager' ? 'ผู้จัดการ' : 'แอดมิน';
                if(data.role === 'manager') document.getElementById('dangerZone').classList.remove('hidden');
                
                document.getElementById('admin-login-view').classList.add('hidden'); 
                document.getElementById('admin-main-view').classList.remove('hidden');
                
                await loadSetupData(); 
                await loadUsers(); 
                switchTab('dashboard');
            } catch(e) {
                alert("เกิดข้อผิดพลาดในการเข้าสู่ระบบ: " + e.message);
            } finally {
                btn.innerText = i18nAdmin[currentAdminLang]['login_btn'];
                btn.disabled = false;
            }
        }

        function switchTab(tab) {
            ['dashboard', 'pos', 'inventory', 'transfer', 'orders', 'customers', 'promotions', 'reports', 'settings'].forEach(t => { 
                document.getElementById(`${t}-view`).classList.add('hidden'); 
                let btn = document.getElementById(`btnTab-${t}`); 
                if(btn) btn.className = 'px-3 py-2 bg-transparent hover:bg-indigo-800 text-indigo-200 font-bold rounded-lg text-[11px] whitespace-nowrap'; 
            });
            let activeClass = 'px-3 py-2 bg-indigo-700 text-white font-bold rounded-lg text-[11px] shadow-inner whitespace-nowrap'; 
            if(tab === 'reports') activeClass = 'px-3 py-2 bg-amber-600 text-white font-bold rounded-lg text-[11px] shadow-inner whitespace-nowrap'; 
            if(tab === 'settings') activeClass = 'px-3 py-2 bg-slate-950 text-white font-bold rounded-lg text-[11px] shadow-inner whitespace-nowrap';
            
            let btnTab = document.getElementById(`btnTab-${tab}`);
            if(btnTab) btnTab.className = activeClass; 
            document.getElementById(`${tab}-view`).classList.remove('hidden');
            
            try {
                if(tab === 'dashboard') loadAdminDashboard(); 
                if(tab === 'pos') loadAdminPosData(); 
                if(tab === 'inventory') { document.getElementById('adminProductList').innerHTML = '<tr><td colspan="6" class="p-8 text-center text-slate-500">⏳ กำลังโหลดข้อมูล...</td></tr>'; loadInventory(); }
                if(tab === 'transfer') { document.getElementById('transferLogBody').innerHTML = '<tr><td colspan="3" class="p-6 text-center text-slate-500">⏳ กำลังโหลดข้อมูล...</td></tr>'; loadTransferLogs(); }
                if(tab === 'orders') { document.getElementById('adminOrdersList').innerHTML = '<tr><td colspan="6" class="p-6 text-center text-slate-500">⏳ กำลังโหลดข้อมูล...</td></tr>'; loadOrders(); }
                if(tab === 'customers') { document.getElementById('customerTableBody').innerHTML = '<tr><td colspan="5" class="p-6 text-center text-slate-500">⏳ กำลังโหลดข้อมูล...</td></tr>'; loadAdminCustomers(); }
                if(tab === 'promotions') { document.getElementById('adminPromoList').innerHTML = '<tr><td colspan="5" class="p-6 text-center text-slate-500">⏳ กำลังโหลดข้อมูล...</td></tr>'; loadPromotions(); }
                if(tab === 'reports') { initReports().then(() => generateReport()); } 
                if(tab === 'settings') loadSettingsPage();
            } catch(e) { console.error("Tab Load Error:", e); }
        }

        async function loadAdminDashboard() { 
            try {
                const { data: orders } = await _client.from('orders').select('total_amount'); 
                if (orders) { document.getElementById('totalRevenue').innerText = orders.reduce((sum, o) => sum + Number(o.total_amount || 0), 0).toLocaleString() + '.-'; document.getElementById('totalOrdersCount').innerText = orders.length; } 
                const { count } = await _client.from('products').select('*', { count: 'exact', head: true }); 
                document.getElementById('totalProductsCount').innerText = count || 0; 
            } catch(e) { } 
        }

        /* =========================================================
           ระบบดูรายละเอียดบิล (View Details) ที่อัปเกรด
        ========================================================= */
        async function viewOrderDetails(orderId) {
            try {
                document.getElementById('orderDetailModal').classList.remove('hidden');
                document.getElementById('odBillNo').innerText = orderId;
                document.getElementById('odItemsList').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-400">⏳ กำลังโหลดข้อมูลสินค้า...</td></tr>';
                
                const { data: orderData, error: orderErr } = await _client.from('orders').select('*').eq('id', orderId).single();
                if(orderErr) throw orderErr;
                if(!orderData) return alert('ไม่พบบิลนี้');
                
                currentSelectedOrder = orderData;
                document.getElementById('odCusName').innerText = orderData.customer_name;
                
                if(allUsers.length === 0) await loadUsers();
                const salesman = allUsers.find(u => u.id == orderData.salesman_id);
                document.getElementById('odSalesman').innerText = salesman ? salesman.name : 'สำนักงานขาย';
                
                document.getElementById('odDate').innerText = new Date(orderData.created_at).toLocaleString('th-TH');
                document.getElementById('odTotalAmount').innerText = (orderData.total_amount||0).toLocaleString() + '.-';

                updateModalStatusBtn(orderData.payment_status);

                const { data: items, error: itemsErr } = await _client.from('order_items').select('*').eq('order_id', orderId);
                if(itemsErr) throw itemsErr;

                if(items && items.length > 0) {
                    document.getElementById('odItemsList').innerHTML = items.map(item => `
                        <tr class="hover:bg-indigo-50/50">
                            <td class="p-3 font-bold text-slate-700">${item.product_name}</td>
                            <td class="p-3 text-center text-blue-600 font-bold">${item.quantity}</td>
                            <td class="p-3 text-right text-slate-500">${(item.price||0).toLocaleString()}</td>
                            <td class="p-3 text-right font-bold text-slate-800">${((item.price||0)*item.quantity).toLocaleString()}</td>
                        </tr>
                    `).join('');
                } else {
                    document.getElementById('odItemsList').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-400">ไม่มีรายการสินค้า</td></tr>';
                }
            } catch (err) { alert("เกิดข้อผิดพลาดในการโหลดข้อมูลบิล: " + err.message); closeModal('orderDetailModal'); }
        }

        function updateModalStatusBtn(status) {
            const btn = document.getElementById('odStatusBtn');
            const txtPaid = currentAdminLang === 'la' ? i18nAdmin.la.status_paid : i18nAdmin.th.status_paid;
            const txtUnpaid = currentAdminLang === 'la' ? i18nAdmin.la.status_unpaid : i18nAdmin.th.status_unpaid;
            const txtClick = currentAdminLang === 'la' ? i18nAdmin.la.click_to_change : i18nAdmin.th.click_to_change;

            if(status === 'จ่ายแล้ว') {
                btn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all shadow-sm bg-green-100 text-green-700 hover:bg-green-200 active:scale-95';
                btn.innerHTML = `${txtPaid} <span class="font-normal text-[9px] opacity-70">${txtClick}</span>`;
            } else {
                btn.className = 'px-3 py-1 rounded-lg text-xs font-bold transition-all shadow-sm bg-red-100 text-red-700 hover:bg-red-200 active:scale-95';
                btn.innerHTML = `${txtUnpaid} <span class="font-normal text-[9px] opacity-70">${txtClick}</span>`;
            }
        }

        async function togglePaymentFromModal() {
            if(!currentSelectedOrder) return;
            const newStatus = currentSelectedOrder.payment_status === 'จ่ายแล้ว' ? 'ยังไม่จ่าย' : 'จ่ายแล้ว';
            if(!confirm(`เปลี่ยนสถานะบิลนี้เป็น "${newStatus}" ใช่หรือไม่?`)) return;
            
            try {
                const { error } = await _client.from('orders').update({ payment_status: newStatus }).eq('id', currentSelectedOrder.id);
                if (error) throw error;
                currentSelectedOrder.payment_status = newStatus;
                updateModalStatusBtn(newStatus);
                if(!document.getElementById('orders-view').classList.contains('hidden')) loadOrders();
                if(!document.getElementById('reports-view').classList.contains('hidden')) generateReport();

        async function exportReportCSV() {

            const btnExport = document.getElementById('btnExportReport');

                const { data: allItems, error } = await _client.from('order_items').select('*').in('order_id', orderIds);
                if(error) throw error;

                let csv = '\uFEFFวันที่,เวลา,เลขที่บิล,พนักงานขาย,ลูกค้า,สถานะบิล,รหัสสินค้า,สินค้าที่ขาย,ต้นทุนต่อหน่วย,ราคาขายต่อหน่วย,จำนวนที่ซื้อ,รวมมูลค่า\n';

                    const d = new Date(o.created_at);

                    const timeStr = d.toLocaleTimeString('th-TH', {hour: '2-digit', minute:'2-digit'});

                    const itemsInOrder = allItems ? allItems.filter(item => item.order_id === o.id) : [];

                    if(itemsInOrder.length > 0) {
                        itemsInOrder.forEach(item => {
                            const prod = allProducts.find(p => p.id == item.product_id) || {};
                            const prodCode = prod.product_code || '-';
                            const prodCost = prod.cost_price || 0;
                            const itemName = `"${(item.product_name || '').replace(/"/g, '""')}"`;
                            const price = item.price || 0;
                            const qty = item.quantity || 0;
                            const totalItemPrice = price * qty;
                            csv += `${dateStr},${timeStr},#${o.id},"${sName}","${o.customer_name}",${o.payment_status},"${prodCode}",${itemName},${prodCost},${price},${qty},${totalItemPrice}\n`;

                    } else {
                        csv += `${dateStr},${timeStr},#${o.id},"${sName}","${o.customer_name}",${o.payment_status},-,-,0,0,0,0\n`;
                    }
                });

                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.setAttribute("download", `RawData_ยอดขาย_${new Date().toLocaleDateString('th-TH').replace(/\//g, '-')}.csv`);
                document.body.appendChild(link);
                link.click();

        }

        function addAdminPosCart() { const sel = document.getElementById('adminPosProduct'); const pId = parseInt(sel.value); const uSel = document.getElementById('adminPosUnit'); const qty = parseInt(document.getElementById('adminPosQty').value); if (!pId || !qty || qty <= 0) return; const p = allProducts.find(x => x.id === pId); if (!p) return; const unitName = uSel.options[uSel.selectedIndex].getAttribute('data-name'); const unitMul = parseInt(uSel.options[uSel.selectedIndex].getAttribute('data-mul')); const originalPrice = parseFloat(uSel.options[uSel.selectedIndex].getAttribute('data-price')); let finalPrice = originalPrice; let promoApplied = false; let freebiesToAdd = []; const applicablePromos = allPromotions.filter(promo => (promo.skus || []).includes(pId)); applicablePromos.forEach(promo => { let matchedTier = null; (promo.tiers || []).forEach(tier => { if(unitName === tier.buy_unit && qty >= tier.min && qty <= tier.max) matchedTier = tier; }); if (matchedTier) { if (promo.type === 'discount') { finalPrice = matchedTier.reward; promoApplied = true; } else if (promo.type === 'freebie') { const multiplier = Math.floor(qty / matchedTier.min); const totalFreeQty = matchedTier.reward * multiplier; const freeProd = allProducts.find(fp => fp.id == promo.free_product_id); if (freeProd) { let freeUnitMul = 1; if(promo.free_unit === freeProd.pack_unit) freeUnitMul = freeProd.pack_qty; if(promo.free_unit === freeProd.box_unit) freeUnitMul = freeProd.box_qty; freebiesToAdd.push({ ...freeProd, qty: totalFreeQty, unit_name_sell: promo.free_unit, unitMul: freeUnitMul, sell_price: 0, isFreebie: true }); } } } }); const totalBaseQtyNeeded = qty * unitMul; let currentCartBaseQty = adminCart.filter(c => c.id === pId).reduce((s, c) => s + (c.qty * c.unitMul), 0); if (currentCartBaseQty + totalBaseQtyNeeded > p.master_stock) return alert(`⚠️ สต๊อกคลังหลักไม่พอ!\nสินค้า "${p.name}" เหลือ ${p.master_stock}`); let canAddFreebies = true; freebiesToAdd.forEach(fb => { const fbTotalBaseNeed = fb.qty * fb.unitMul; const fbCurrentCartBaseQty = adminCart.filter(c => c.id === fb.id).reduce((s, c) => s + (c.qty * c.unitMul), 0); let totalStockNeed = fbCurrentCartBaseQty + fbTotalBaseNeed; if(pId === fb.id) totalStockNeed += totalBaseQtyNeeded; if(totalStockNeed > fb.master_stock) { alert(`⚠️ สต๊อกคลังหลักไม่พอแถม!\nสินค้า "${fb.name}"`); canAddFreebies = false; } }); if(!canAddFreebies) return; adminCart.push({ ...p, qty: qty, unit_name_sell: unitName, unitMul: unitMul, sell_price: finalPrice, hasPromo: promoApplied }); freebiesToAdd.forEach(fb => adminCart.push(fb)); document.getElementById('adminPosQty').value = ''; sel.value = ''; updateAdminPosUnitOptions(); renderAdminPosCart(); }

        async function loadPromotions() { try { const { data } = await _client.from('promotions').select('*').order('created_at', { ascending: false }); if (data) { allPromotions = data; if (allProducts.length === 0) await loadInventory(); document.getElementById('adminPromoList').innerHTML = data.map(promo => { const skusCount = (promo.skus || []).length; const tiersCount = (promo.tiers || []).length; const statusBadge = promo.is_active ? '<span class="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] font-bold">ใช้งาน</span>' : '<span class="bg-slate-200 text-slate-500 px-2 py-1 rounded text-[10px] font-bold">ปิด</span>'; return `<tr class="hover:bg-slate-50"><td class="p-4"><p class="font-bold text-slate-800">${promo.name}</p><span class="text-[10px] text-slate-400 border px-1 rounded">${promo.type === 'discount' ? 'ลดราคาตามขั้น' : 'แถมของตามขั้น'}</span></td><td class="p-4 text-center font-bold text-indigo-600">${tiersCount} ขั้น</td><td class="p-4 text-center text-xs text-slate-500">${skusCount} รายการ</td><td class="p-4 text-center">${statusBadge}</td><td class="p-4 text-center"><button onclick="openPromoEdit(${promo.id})" class="text-xs font-bold text-indigo-600 bg-indigo-50 px-3 py-1 rounded">แก้ไข</button><button onclick="deletePromo(${promo.id})" class="ml-2 text-xs font-bold text-red-500">ลบ</button></td></tr>`; }).join(''); } } catch(e) {} }
        function togglePromoType() { const type = document.getElementById('epromoType').value; if (type === 'freebie') document.getElementById('promoTypeFreebie').classList.remove('hidden'); else document.getElementById('promoTypeFreebie').classList.add('hidden'); renderPromoTiers(); }
        async function openPromoEdit(id = null) { if (allProducts.length === 0) await loadInventory(); const chkHtml = allProducts.map(p => `<div class="flex items-center gap-2"><input type="checkbox" id="psku_${p.id}" value="${p.id}" class="promo-sku-chk w-4 h-4 text-indigo-600"><label for="psku_${p.id}" class="text-[10px] text-slate-700 truncate cursor-pointer">${p.product_code?`[${p.product_code}] `:''}${p.name}</label></div>`).join(''); document.getElementById('promoSkusContainer').innerHTML = chkHtml; document.getElementById('epromoFreeProduct').innerHTML = '<option value="">-- เลือกของแถม --</option>' + allProducts.map(p => `<option value="${p.id}">${p.product_code?`[${p.product_code}] `:''}${p.name}</option>`).join(''); if (id) { const p = allPromotions.find(x=>x.id===id); document.getElementById('epromoTitle').innerHTML = '✏️ แก้ไขโปรโมชั่น'; document.getElementById('epromoId').value = p.id; document.getElementById('epromoName').value = p.name; document.getElementById('epromoType').value = p.type; document.getElementById('epromoIsActive').checked = p.is_active; if (p.type === 'freebie') { document.getElementById('epromoFreeProduct').value = p.free_product_id || ''; document.getElementById('epromoFreeUnit').value = p.free_unit || ''; } (p.skus || []).forEach(skuId => { const chk = document.getElementById(`psku_${skuId}`); if(chk) chk.checked = true; }); promoTiers = p.tiers || []; } else { document.getElementById('epromoTitle').innerHTML = '➕ สร้างโปรโมชั่นใหม่'; document.getElementById('epromoId').value = ''; document.getElementById('epromoName').value = ''; document.getElementById('epromoType').value = 'discount'; document.getElementById('epromoIsActive').checked = true; document.getElementById('epromoFreeProduct').value = ''; document.getElementById('epromoFreeUnit').value = ''; document.querySelectorAll('.promo-sku-chk').forEach(c => c.checked = false); promoTiers = []; } togglePromoType(); renderPromoTiers(); document.getElementById('editPromoModal').classList.remove('hidden'); }
        function addPromoTier() { if (promoTiers.length >= 7) return alert('สูงสุด 7 ขั้น'); promoTiers.push({ min: 1, max: 9999, buy_unit: 'ลัง', reward: 0 }); renderPromoTiers(); }
        function removePromoTier(index) { promoTiers.splice(index, 1); renderPromoTiers(); }
        function updateTierVal(index, field, val) { promoTiers[index][field] = val; }
        function renderPromoTiers() { const container = document.getElementById('promoTiersContainer'); const type = document.getElementById('epromoType').value; const rewardLabel = type === 'discount' ? 'ให้ราคาโปร(Z)' : 'จำนวนที่แถม(Y)'; if(promoTiers.length === 0) { container.innerHTML = '<p class="text-[10px] text-slate-400 text-center py-4 border border-dashed rounded">ยังไม่มีการกำหนดขั้นบันได</p>'; return; } container.innerHTML = promoTiers.map((t, i) => `<div class="flex items-center gap-1 bg-slate-50 border border-slate-200 p-2 rounded-lg mb-2"><span class="text-[10px] font-bold text-indigo-700 w-12 shrink-0">ขั้นที่ ${i+1}</span><input type="number" value="${t.min}" onchange="updateTierVal(${i}, 'min', this.value)" class="w-14 p-1 text-[10px] border rounded text-center" placeholder="ขั้นต่ำ"><span class="text-[10px] text-slate-400">-</span><input type="number" value="${t.max}" onchange="updateTierVal(${i}, 'max', this.value)" class="w-14 p-1 text-[10px] border rounded text-center" placeholder="สูงสุด"><select onchange="updateTierVal(${i}, 'buy_unit', this.value)" class="w-16 p-1 text-[10px] border rounded"><option value="ชิ้น" ${t.buy_unit==='ชิ้น'?'selected':''}>ชิ้น</option><option value="แพ็ค" ${t.buy_unit==='แพ็ค'?'selected':''}>แพ็ค</option><option value="ลัง" ${t.buy_unit==='ลัง'?'selected':''}>ลัง</option></select><span class="text-[10px] mx-1 text-slate-400">👉 ${rewardLabel}</span><input type="number" value="${t.reward}" onchange="updateTierVal(${i}, 'reward', this.value)" class="w-20 p-1 text-[10px] border rounded font-bold text-blue-600"><button onclick="removePromoTier(${i})" class="text-red-500 font-bold px-2 ml-auto shrink-0">X</button></div>`).join(''); }
        async function savePromoEdit() { const id = document.getElementById('epromoId').value; const type = document.getElementById('epromoType').value; const name = document.getElementById('epromoName').value.trim(); const selectedSkus = Array.from(document.querySelectorAll('.promo-sku-chk:checked')).map(cb => parseInt(cb.value)); if (!name) return; if (selectedSkus.length === 0) return; const payload = { name: name, type: type, skus: selectedSkus, is_active: document.getElementById('epromoIsActive').checked, tiers: promoTiers.map(t => ({ min: Number(t.min)||1, max: Number(t.max)||9999, buy_unit: t.buy_unit, reward: Number(t.reward)||0 })) }; if (type === 'freebie') { payload.free_product_id = parseInt(document.getElementById('epromoFreeProduct').value) || null; payload.free_unit = document.getElementById('epromoFreeUnit').value.trim(); } else { payload.free_product_id = null; payload.free_unit = null; } try { if (id) await _client.from('promotions').update(payload).eq('id', id); else await _client.from('promotions').insert([payload]); closeModal('editPromoModal'); loadPromotions(); } catch(e) {} }
        async function deletePromo(id) { if (!confirm('ลบ?')) return; await _client.from('promotions').delete().eq('id', id); loadPromotions(); }

        async function loadSettingsPage() { try { await loadSetupData(); document.getElementById('categoryList').innerHTML = globalCategories.length > 0 ? globalCategories.map(c => `<li class="p-3 flex justify-between"><span>${c.name}</span><button onclick="deleteCategory(${c.id})" class="text-red-500 text-xs hover:underline">ลบ</button></li>`).join('') : '<li class="p-3 text-slate-400 text-center">ไม่มีข้อมูล</li>'; document.getElementById('unitList').innerHTML = globalUnits.length > 0 ? globalUnits.map(u => `<li class="p-3 flex justify-between"><span>${u.name}</span><button onclick="deleteUnit(${u.id})" class="text-red-500 text-xs hover:underline">ลบ</button></li>`).join('') : '<li class="p-3 text-slate-400 text-center">ไม่มีข้อมูล</li>'; } catch(e) { } }
        async function saveCategory() { const name = document.getElementById('inpCatName').value.trim(); if(!name) return; await _client.from('product_categories').insert([{name}]); document.getElementById('inpCatName').value=''; loadSettingsPage(); }
        async function deleteCategory(id) { if(!confirm('ลบหมวดหมู่นี้?')) return; await _client.from('product_categories').delete().eq('id', id); loadSettingsPage(); }
        async function saveUnit() { const name = document.getElementById('inpUnitName').value.trim(); if(!name) return; await _client.from('product_units').insert([{name}]); document.getElementById('inpUnitName').value=''; loadSettingsPage(); }
        async function deleteUnit(id) { if(!confirm('ลบหน่วยสินค้านี้?')) return; await _client.from('product_units').delete().eq('id', id); loadSettingsPage(); }
        function openUserEdit(id = null) { if(id) { const u = allUsers.find(x => x.id === id); document.getElementById('euTitle').innerHTML = '✏️ แก้ไขพนักงาน'; document.getElementById('euId').value = u.id; document.getElementById('euName').value = u.name; document.getElementById('euPin').value = u.pin; document.getElementById('euRole').value = u.role || 'sales'; } else { document.getElementById('euTitle').innerHTML = '➕ เพิ่มพนักงานใหม่'; document.getElementById('euId').value = ''; document.getElementById('euName').value = ''; document.getElementById('euPin').value = ''; document.getElementById('euRole').value = 'sales'; } document.getElementById('editUserModal').classList.remove('hidden'); }
        async function saveUserEdit() { const id = document.getElementById('euId').value; const payload = { name: document.getElementById('euName').value.trim(), pin: document.getElementById('euPin').value.trim(), role: document.getElementById('euRole').value }; if(!payload.name || !payload.pin) return; try { if(id) { await _client.from('salesmen').update(payload).eq('id', id); } else { await _client.from('salesmen').insert([payload]); } closeModal('editUserModal'); loadUsers(); } catch (err) {} }
        async function deleteUser(id, name) { if(id === currentAdmin.id) return; if(!confirm(`ลบ ${name} ?`)) return; await _client.from('salesmen').delete().eq('id', id); loadUsers(); }
        async function clearSystemData(type) { if(currentAdmin.role !== 'manager') return; if(type === 'orders') { const pass = prompt('พิมพ์ CONFIRM'); if(pass !== 'CONFIRM') return; await _client.from('order_items').delete().neq('id', 0); await _client.from('orders').delete().neq('id', 0); } else if (type === 'inventory') { const pass = prompt('พิมพ์ CONFIRM'); if(pass !== 'CONFIRM') return; await _client.from('salesman_inventory').delete().neq('id', 0); await _client.from('products').delete().neq('id', 0); } location.reload(); }
    </script>
</body>
